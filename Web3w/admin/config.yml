backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "/"
display_url: "/"
logo_url: "https://web3warsaw.com/wp-content/uploads/2026/02/LOGO-WHITE.png"

collections:
  - name: "site_settings"
    label: "Site Content"
    files:
      - name: "site"
        label: "Global Site Content"
        file: "_data/site.yml"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
          - label: "Navigation"
            name: "nav"
            widget: "object"
            fields:
              - {label: "Logo Image", name: "logo_image", widget: "image", required: false}
              - {label: "Logo Alt", name: "logo_alt", widget: "string", required: false}
              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - {label: "Label", name: "label", widget: "string"}
                  - {label: "URL", name: "url", widget: "string"}
              - {label: "CTA Text", name: "cta_text", widget: "string"}
              - {label: "CTA URL", name: "cta_url", widget: "string"}
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Badge", name: "badge", widget: "string"}
              - {label: "Title Line 1", name: "title_line_1", widget: "string"}
              - {label: "Title Line 2", name: "title_line_2", widget: "string"}
              - {label: "Subtitle Before Rotating Word", name: "subtitle_before", widget: "string"}
              - {label: "Rotating Words", name: "rotating_words", widget: "list", field: {label: "Word", name: "word", widget: "string"}}
              - {label: "Subtitle After Rotating Word", name: "subtitle_after", widget: "string"}
              - {label: "Date / Location Text", name: "date_location", widget: "string"}
              - {label: "Countdown Date ISO", name: "event_date_iso", widget: "string"}
              - {label: "Primary Button Text", name: "primary_button_text", widget: "string"}
              - {label: "Primary Button URL", name: "primary_button_url", widget: "string"}
              - {label: "Secondary Button Text", name: "secondary_button_text", widget: "string"}
              - {label: "Secondary Button URL", name: "secondary_button_url", widget: "string"}
              - label: "Stats"
                name: "stats"
                widget: "list"
                fields:
                  - {label: "Number HTML", name: "number_html", widget: "string"}
                  - {label: "Label", name: "label", widget: "string"}
          - label: "Ticker"
            name: "ticker"
            widget: "object"
            fields:
              - {label: "Ticker Items", name: "items", widget: "list", field: {label: "Item", name: "item", widget: "string"}}
          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - {label: "Kicker", name: "kicker", widget: "string"}
              - {label: "Title HTML", name: "title_html", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - label: "Cards"
                name: "cards"
                widget: "list"
                fields:
                  - {label: "Number", name: "number", widget: "string"}
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Text", name: "text", widget: "text"}
              - {label: "Poster Logo HTML", name: "poster_logo_html", widget: "string"}
              - {label: "Poster Title HTML", name: "poster_title_html", widget: "string"}
              - {label: "Poster Meta Left", name: "poster_meta_left", widget: "string"}
              - {label: "Poster Meta Right", name: "poster_meta_right", widget: "string"}
          - label: "Tickets Section Text"
            name: "tickets_section"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Title HTML", name: "title_html", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Note", name: "note", widget: "text", required: false}
          - label: "Speakers Section Text"
            name: "speakers_section"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Title HTML", name: "title_html", widget: "string"}
              - {label: "Top Button Text", name: "all_speakers_text", widget: "string"}
              - {label: "Top Button URL", name: "all_speakers_url", widget: "string"}
              - {label: "Apply Button Text", name: "apply_text", widget: "string"}
              - {label: "Apply Button URL", name: "apply_url", widget: "string"}
              - {label: "Bottom Button Text", name: "bottom_all_text", widget: "string"}
              - {label: "Bottom Button URL", name: "bottom_all_url", widget: "string"}
          - label: "Sponsors Section Text"
            name: "sponsors_section"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Title HTML", name: "title_html", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Button Text", name: "button_text", widget: "string"}
              - {label: "Button URL", name: "button_url", widget: "string"}
              - {label: "Tiers Title", name: "tiers_title", widget: "string"}
              - label: "Sponsorship Tiers"
                name: "tiers"
                widget: "list"
                fields:
                  - {label: "Name", name: "name", widget: "string"}
                  - {label: "Description", name: "description", widget: "string"}
                  - {label: "CSS Color Style", name: "color_style", widget: "string"}
              - {label: "Tiers Note", name: "tiers_note", widget: "text"}
          - label: "Agenda Section Text"
            name: "agenda_section"
            widget: "object"
            fields:
              - {label: "Enabled", name: "enabled", widget: "boolean", default: false}
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Title HTML", name: "title_html", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
          - label: "Venue Section Text"
            name: "venue_section"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Title HTML", name: "title_html", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
          - label: "CTA"
            name: "cta"
            widget: "object"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "Title HTML", name: "title_html", widget: "string"}
              - {label: "Subtitle", name: "subtitle", widget: "string"}
              - {label: "Primary Button Text", name: "primary_button_text", widget: "string"}
              - {label: "Primary Button URL", name: "primary_button_url", widget: "string"}
              - {label: "Secondary Button Text", name: "secondary_button_text", widget: "string"}
              - {label: "Secondary Button URL", name: "secondary_button_url", widget: "string"}
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - {label: "Logo HTML", name: "logo_html", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - label: "Social Links"
                name: "socials"
                widget: "list"
                fields:
                  - {label: "Label", name: "label", widget: "string"}
                  - {label: "URL", name: "url", widget: "string"}
              - label: "Footer Columns"
                name: "columns"
                widget: "list"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - label: "Links"
                    name: "links"
                    widget: "list"
                    fields:
                      - {label: "Label", name: "label", widget: "string"}
                      - {label: "URL", name: "url", widget: "string"}
                      - {label: "Open In New Tab", name: "new_tab", widget: "boolean", required: false, default: false}
              - {label: "Event Date", name: "event_date", widget: "string"}
              - {label: "Event Location", name: "event_location", widget: "string"}
              - {label: "Copyright", name: "copyright", widget: "string"}
              - {label: "Bottom Brand", name: "brand", widget: "string"}

  - name: "tickets"
    label: "Tickets"
    files:
      - name: "tickets"
        label: "Ticket Cards"
        file: "_data/tickets.yml"
        fields:
          - label: "Tickets"
            name: "tickets"
            widget: "list"
            fields:
              - {label: "Featured", name: "featured", widget: "boolean", default: false}
              - {label: "Tag", name: "tag", widget: "string"}
              - {label: "Ticket Image", name: "image", widget: "image", required: false}
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Currency", name: "currency", widget: "string"}
              - {label: "Amount", name: "amount", widget: "string"}
              - {label: "VAT Text", name: "vat", widget: "string"}
              - {label: "Features", name: "features", widget: "list", field: {label: "Feature", name: "feature", widget: "string"}}
              - {label: "Button Text", name: "button_text", widget: "string"}
              - {label: "Button URL", name: "button_url", widget: "string"}

  - name: "speakers"
    label: "Speakers"
    files:
      - name: "speakers"
        label: "Speaker Cards"
        file: "_data/speakers.yml"
        fields:
          - label: "Speakers"
            name: "speakers"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Role", name: "role", widget: "string"}
              - {label: "Photo", name: "photo", widget: "image", required: false}
              - {label: "Initials", name: "initials", widget: "string", required: false}
              - label: "Social Links"
                name: "socials"
                widget: "list"
                required: false
                fields:
                  - {label: "Label", name: "label", widget: "string"}
                  - {label: "URL", name: "url", widget: "string"}

  - name: "sponsors"
    label: "Sponsors"
    files:
      - name: "sponsors"
        label: "Sponsor Logos"
        file: "_data/sponsors.yml"
        fields:
          - label: "Sponsors"
            name: "sponsors"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Logo", name: "logo", widget: "image"}
              - {label: "URL", name: "url", widget: "string", required: false}

  - name: "agenda"
    label: "Agenda"
    files:
      - name: "agenda"
        label: "Schedule Items"
        file: "_data/agenda.yml"
        fields:
          - label: "Agenda Items"
            name: "agenda"
            widget: "list"
            fields:
              - {label: "Day", name: "day", widget: "string"}
              - {label: "Time", name: "time", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Speaker", name: "speaker", widget: "string", required: false}
              - {label: "Location", name: "location", widget: "string", required: false}
              - {label: "Description", name: "description", widget: "text", required: false}

  - name: "venue"
    label: "Event Info Cards"
    files:
      - name: "venue"
        label: "Event Info Cards"
        file: "_data/venue.yml"
        fields:
          - label: "Cards"
            name: "venue"
            widget: "list"
            fields:
              - {label: "Number", name: "number", widget: "string"}
              - {label: "Icon", name: "icon", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Text", name: "text", widget: "text"}
